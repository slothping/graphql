<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reboot Profile</title>
    <link rel="icon" href="reboot_logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header id="app-header" hidden>
        <div class="header-left">
            <img src="reboot_logo.png" alt="Reboot logo" class="header-logo">
            <div>
                <div class="header-title">Reboot Dashboard</div>
                <div class="header-subtitle">Project status & profile</div>
            </div>
        </div>
        <div class="header-right">
            <a id="header-gitea" href="https://learn.reboot01.com/git/" target="_blank" rel="noopener"
                aria-label="Open Gitea">
                <img src="gitea_logo.svg" alt="Gitea" class="header-gitea-img">
            </a>
            <span id="header-username">Guest</span>
            <button id="header-auth-button" type="button">Login</button>
        </div>
    </header>

    <div id="login-container">
        <h2>Login</h2>

        <div id="error-msg"></div>

        <form id="login-form">
            <input type="text" id="identifier" placeholder="Username or Email" required>

            <input type="password" id="password" placeholder="Password" required>

            <button type="submit">
                Login
            </button>
        </form>
    </div>

    <div id="profile-container" hidden>

        <div id="user-data"></div>
        <div id="insights-section"></div>
        <div id="project-history-section"></div>

        <div class="graph-card xp-graph-card">
            <h3>XP Progress</h3>
            <svg id="xp-graph" width="600" height="250"></svg>
        </div>

        <div class="graph-card audit-graph-card">
            <h3>Audit Ratio</h3>
            <svg id="audit-graph" width="300" height="300"></svg>
        </div>

    </div>

    <script type="module" src="./js/main.js"></script>

    <div id="tooltip"></div>

</body>

</html>
