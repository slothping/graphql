<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reboot Profile</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="login-container">
        <h2>Login</h2>

        <div id="error-msg"></div>

        <form id="login-form">
            <input type="text" id="identifier" placeholder="Username or Email" required>

            <input type="password" id="password" placeholder="Password" required>

            <button type="submit">
                Login
            </button>
        </form>
    </div>

    <div id="profile-container" hidden>

        <h2>Profile</h2>

        <button id="logout-btn">
            Logout
        </button>

        <div id="user-data"></div>

        <div id="insights-section"></div>
        <div id="project-history-section"></div>

        <div class="graph-card xp-graph-card">
            <h3>XP Progress</h3>
            <svg id="xp-graph" width="600" height="250"></svg>
        </div>

        <div class="graph-card audit-graph-card">
            <h3>Audit Ratio</h3>
            <svg id="audit-graph" width="300" height="300"></svg>
        </div>

    </div>

    <script type="module" src="./js/main.js"></script>

    <div id="tooltip"></div>

</body>

</html>
