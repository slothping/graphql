<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>
  <link rel="icon" href="reboot_logo.png" type="image/png" />
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #1d1d1d;
      color: #f5f5f5;
      padding: 24px;
    }

    .card {
      max-width: 520px;
      width: 100%;
      background: #262626;
      border: 1px solid #3a3a3a;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 20px;
      line-height: 1.6;
      color: #d0d0d0;
    }

    a {
      display: inline-block;
      padding: 10px 16px;
      background: #f6c700;
      color: #111;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Page not found</h1>
    <p>The page you requested does not exist. You can return to the main profile page.</p>
    <a href="./index.html">Go back home</a>
  </main>
</body>
</html>
